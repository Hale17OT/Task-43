services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: justiceops
      POSTGRES_USER: justiceops
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/infrastructure/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U justiceops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://justiceops:devpassword@db:5432/justiceops
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-min32chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-in-prd}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "4200:80"

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: test
    profiles:
      - test

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      - frontend
      - backend
    environment:
      BASE_URL: http://frontend:80
    profiles:
      - test

volumes:
  pgdata:
